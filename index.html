<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bolão Copa do Mundo 2026</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#081120;
  color:white;
  padding:25px;
}

h1{
  color:#00d9ff;
  margin-bottom:20px;
}

h2{
  margin:30px 0 15px;
  color:#00d9ff;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#00d9ff;
  color:black;
}

.btn-danger{
  background:red;
  color:white;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.participants{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.participant{
  background:#121d33;
  padding:12px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.matches{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
  gap:20px;
}

.card{
  background:#121d33;
  border-radius:16px;
  padding:18px;
}

.match{
  background:#1c2a49;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
}

.teams{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  font-weight:bold;
}

.score{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

input[type=number]{
  width:60px;
  padding:10px;
  border:none;
  border-radius:10px;
  text-align:center;
  background:#081120;
  color:white;
  font-size:16px;
}

select{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#121d33;
  color:white;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th{
  background:#00d9ff;
  color:black;
  padding:12px;
}

td{
  background:#121d33;
  padding:12px;
  border-bottom:1px solid #23355d;
  text-align:center;
}

.info{
  background:#121d33;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  line-height:1.8;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin:20px 0;
}

</style>

</head>

<body>

<div class="top">

  <h1>🏆 Silva's & Salatis 🏆 </h1>
  <h2>🏆 Bolão Copa do Mundo 2026</h2>

  <button class="btn" onclick="addParticipant()">
    + Participante
  </button>

</div>

<!-- PARTICIPANTES -->

<h2>👥 Participantes</h2>

<div class="participants" id="participants"></div>

<!-- ESCOLHER PARTICIPANTE -->

<h2>✍️ Fazer Palpites</h2>

<select id="participantSelect" onchange="loadParticipantGuesses()"></select>

<!-- REGRAS -->

<div class="info">

<strong>📌 Regras:</strong><br><br>

✅ Acertou vencedor = <strong>2 pontos</strong><br>

✅ Acertou placar exato = <strong>5 pontos</strong>

</div>

<!-- JOGOS -->

<h2>⚽ Jogos</h2>

<div class="matches" id="matches"></div>

<div class="actions">

  <button class="btn" onclick="saveGuesses()">
    💾 Salvar Palpites
  </button>

</div>

<!-- RESULTADOS OFICIAIS -->

<h2>📋 Resultados Oficiais</h2>

<button class="btn" onclick="toggleResults()">
  ⚽ Preencher Resultados Oficiais
</button>

<div 
  id="resultsArea"
  style="display:none;margin-top:20px;"
></div>

<!-- RANKING -->

<h2>🏅 Ranking</h2>

<table>

<thead>

<tr>

  <th>#</th>
  <th>Participante</th>
  <th>Pontos</th>

</tr>

</thead>

<tbody id="ranking"></tbody>

</table>

<!-- 🔥 FIREBASE (SÓ BANCO) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAWdrSxR6SQpDhzPGxz8BfJI-T10IPPxCE",
  authDomain: "bolaosalatisilva.firebaseapp.com",
  databaseURL: "https://bolaosalatisilva-default-rtdb.firebaseio.com",
  projectId: "bolaosalatisilva",
  storageBucket: "bolaosalatisilva.appspot.com",
  messagingSenderId: "1022658429537",
  appId: "1:1022658429537:web:a988d26360b197a3fea020"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let participants = [];
let guesses = {};
let officialResults = {};

// JOGOS
const matches = [
  {id:1, home:'Brasil', away:'Marrocos'},
  {id:2, home:'Argentina', away:'Canadá'},
  {id:3, home:'Portugal', away:'Colômbia'},
  {id:4, home:'França', away:'Noruega'},
  {id:5, home:'Alemanha', away:'Japão'},
  {id:6, home:'Espanha', away:'Uruguai'},
  {id:7, home:'México', away:'Estados Unidos'},
  {id:8, home:'Inglaterra', away:'Dinamarca'}
];

// 🔥 LOAD FIREBASE
function loadAll(){
  db.ref("bolao").on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    participants = data.participants || [];
    guesses = data.guesses || {};
    officialResults = data.officialResults || {};

    renderParticipants();
    renderSelect();
    renderMatches();
    renderRanking();
  });
}

// 🔥 SAVE FIREBASE
function saveAll(){
  db.ref("bolao").set({
    participants,
    guesses,
    officialResults
  });
}

// RESTO DO SEU CÓDIGO (INALTERADO)

function addParticipant(){

  const name = prompt('Digite o nome do participante');
  if(!name) return;

  participants.push({
    name:name,
    points:0
  });

  guesses[name] = {};
  saveAll();

  renderParticipants();
  renderSelect();
  renderRanking();
}

function removeParticipant(index){

  const name = participants[index].name;

  const confirmDelete = confirm(`Remover ${name}?`);
  if(confirmDelete){

    participants.splice(index,1);
    delete guesses[name];

    saveAll();
    renderParticipants();
    renderSelect();
    renderRanking();
  }
}

function renderParticipants(){

  const div = document.getElementById('participants');
  div.innerHTML = '';

  participants.forEach((p,index)=>{

    div.innerHTML += `
      <div class="participant">
        <span>${p.name}</span>
        <button class="btn-danger" onclick="removeParticipant(${index})">X</button>
      </div>
    `;

  });
}

function renderSelect(){

  const select = document.getElementById('participantSelect');
  select.innerHTML = '';

  participants.forEach(p=>{

    select.innerHTML += `
      <option value="${p.name}">
        ${p.name}
      </option>
    `;

  });

  loadParticipantGuesses();
}

function renderMatches(){

  const div = document.getElementById('matches');
  div.innerHTML = '';

  matches.forEach(match=>{

    div.innerHTML += `
      <div class="card">
        <div class="match">
          <div class="teams">
            <span>${match.home}</span>
            <span>VS</span>
            <span>${match.away}</span>
          </div>

          <div class="score">
            <input type="number" id="home-${match.id}">
            <span>x</span>
            <input type="number" id="away-${match.id}">
          </div>
        </div>
      </div>
    `;

  });
}

function saveGuesses(){

  const participant = document.getElementById('participantSelect').value;

  guesses[participant] = {};

  matches.forEach(match=>{

    guesses[participant][match.id] = {
      home: document.getElementById(`home-${match.id}`).value,
      away: document.getElementById(`away-${match.id}`).value
    };

  });

  saveAll();
  alert('Palpites salvos!');
}

function loadParticipantGuesses(){

  const participant = document.getElementById('participantSelect').value;

  matches.forEach(match=>{

    const g = guesses[participant]?.[match.id];

    document.getElementById(`home-${match.id}`).value = g?.home || '';
    document.getElementById(`away-${match.id}`).value = g?.away || '';

  });
}

function renderRanking(){

  const tbody = document.getElementById('ranking');
  tbody.innerHTML = '';

  const sorted = [...participants].sort((a,b)=>b.points-a.points);

  sorted.forEach((p,i)=>{

    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${p.name}</td>
        <td>${p.points}</td>
      </tr>
    `;

  });
}

// INIT
loadAll();

</script>

</body>
</html>
